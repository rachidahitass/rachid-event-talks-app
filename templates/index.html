<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore and share Google BigQuery release notes. Filter, search, and Tweet specific updates easily with a modern, high-fidelity dashboard.">
    <title>BigQuery Release Explorer</title>
    
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Background elements for visual depth -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="header-logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#grad1)" />
                        <path d="M2 17L12 22L22 17M2 12L12 17L22 12" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <defs>
                            <linearGradient id="grad1" x1="2" y1="2" x2="22" y2="12" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#4285F4" />
                                <stop offset="1" stop-color="#34A853" />
                            </linearGradient>
                            <linearGradient id="grad2" x1="2" y1="12" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#34A853" />
                                <stop offset="1" stop-color="#FBBC05" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div>
                    <h1 id="main-title">BigQuery Release Explorer</h1>
                    <p class="header-subtitle">Stay updated with Google BigQuery improvements and share the news</p>
                </div>
            </div>
            
            <div class="header-actions">
                <button id="theme-toggle-btn" class="btn btn-secondary" aria-label="Toggle Color Theme"></button>
                <button id="export-csv-btn" class="btn btn-secondary" aria-label="Export to CSV">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    <span>Export CSV</span>
                </button>
                <button id="refresh-btn" class="btn btn-primary" aria-label="Refresh Release Notes">
                    <svg class="icon sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Filters and Search Toolbar -->
        <section class="toolbar-section" aria-label="Filters and search">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search release updates (e.g. Gemini, ALTER TABLE...)" aria-label="Search updates">
                <button id="clear-search" class="clear-btn" style="display:none;" aria-label="Clear search">×</button>
            </div>

            <div class="filter-controls">
                <div class="category-pills" id="category-pills-container" role="group" aria-label="Filter by category">
                    <button class="pill active" data-category="all">All</button>
                    <!-- Category pills will be dynamically populated -->
                </div>

                <div class="sort-wrapper">
                    <label for="sort-select">Sort:</label>
                    <select id="sort-select" aria-label="Sort order">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Feed Container -->
        <main class="feed-section">
            <div class="feed-status" id="feed-status-msg" style="display: none;">
                <!-- Error or status message -->
            </div>

            <!-- Skeleton loading loader -->
            <div id="skeleton-loader" class="skeleton-container">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>

            <div id="releases-feed" class="releases-feed">
                <!-- Cards will be dynamically injected here -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>BigQuery Release Explorer &copy; 2026. Made with Google Cloud Feed integration.</p>
        </footer>
    </div>

    <!-- Interactive Tweet Composer Modal -->
    <div id="tweet-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Tweet Update</h2>
                <button id="close-modal" class="close-modal-btn" aria-label="Close dialog">&times;</button>
            </div>
            <div class="modal-body">
                <div class="tweet-card-preview">
                    <div class="tweet-author-header">
                        <div class="tweet-avatar">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                            </svg>
                        </div>
                        <div class="tweet-author-info">
                            <span class="tweet-author-name">Cloud Explorer</span>
                            <span class="tweet-author-handle">@cloud_release</span>
                        </div>
                    </div>
                    
                    <textarea id="tweet-textarea" class="tweet-textarea" maxlength="280" placeholder="What's happening?"></textarea>
                    
                    <div class="tweet-media-preview" id="tweet-media-box">
                        <div class="media-title" id="tweet-media-title"></div>
                        <div class="media-desc" id="tweet-media-desc"></div>
                    </div>
                </div>

                <div class="modal-actions-bar">
                    <span id="char-counter" class="char-counter">280</span>
                    <div class="action-buttons">
                        <button id="cancel-tweet" class="btn btn-secondary">Cancel</button>
                        <button id="submit-tweet" class="btn btn-tweet">
                            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                            <span>Post on X</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
